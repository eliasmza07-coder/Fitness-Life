<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fitness Life | Calculadora</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="calculadora.css">
</head>

<body>

<!-- ===================== LOADER ===================== -->
<div id="loader">
    <div class="loader-content">

        <div class="line-loader">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

        <h2>Fitness Life</h2>
        <p>Cargando...</p>

    </div>
</div>

<!-- ================= NAVBAR ================= -->
<header class="navbar">

    <div class="nav-container">

        <a href="index.html" class="logo-box">
            <img src="img/logo.png" class="nav-logo" alt="Logo">
            <span class="logo-text">Fitness Life</span>
        </a>

        <button class="menu-toggle" id="menu-toggle">☰</button>

        <nav class="nav-links" id="nav-links">
            <a href="index.html">Inicio</a>
    
            

            <a href="javascript:history.back()" class="back-btn">← Volver</a>
        </nav>

    </div>

</header>

<!-- ================= CONTENIDO ================= -->
<main class="calc-container">

    <h1>Calculadora de requerimientos</h1>

    <div class="calc-form">

        <input type="number" id="edad" placeholder="Edad">

        <select id="sexo">
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
        </select>

        <input type="number" id="peso" placeholder="Peso (kg)">
        <input type="number" id="altura" placeholder="Altura (cm)">

        <select id="actividad">
            <option value="1.2">Poco o nada de ejercicio</option>
            <option value="1.375">Entreno 1–3 días por semana</option>
            <option value="1.55">Entreno 3–5 días por semana</option>
            <option value="1.725">Entreno 6–7 días por semana</option>
            <option value="1.9">Entrenamiento intenso diario</option>
        </select>

        <select id="objetivo">
            <option value="deficit">Perder grasa</option>
            <option value="mantenimiento">Mantener peso</option>
            <option value="superavit">Ganar músculo</option>
        </select>

        <button id="btnCalcular">Calcular</button>
        <button id="btnReset" type="button">Reiniciar</button>

    </div>

    <div id="resultado" class="resultado">
        <p class="placeholder">Completa los datos para ver tu análisis</p>
    </div>

</main>

<!-- ================= LOADER SCRIPT ================= -->
<script>
window.addEventListener("load", () => {

    const loader = document.getElementById("loader");

    document.body.style.opacity = "1";

    setTimeout(() => {
        loader.style.opacity = "0";
        loader.style.transform = "scale(1.03)";
        loader.style.transition = "0.8s ease";

        setTimeout(() => {
            loader.style.display = "none";
        }, 800);

    }, 1200);

});
</script>

<!-- ================= LÓGICA ================= -->
<script>
const btnCalcular = document.getElementById("btnCalcular");
const btnReset = document.getElementById("btnReset");
const resultado = document.getElementById("resultado");

btnCalcular.addEventListener("click", () => {

    const edad = parseInt(document.getElementById("edad").value);
    const sexo = document.getElementById("sexo").value;
    const peso = parseFloat(document.getElementById("peso").value);
    const altura = parseFloat(document.getElementById("altura").value);
    const actividad = parseFloat(document.getElementById("actividad").value);
    const objetivo = document.getElementById("objetivo").value;

    if (isNaN(edad) || isNaN(peso) || isNaN(altura)) {
        resultado.innerHTML = `<p>Completa todos los campos correctamente.</p>`;
        return;
    }

    const imc = peso / ((altura / 100) ** 2);

    const imcText =
        imc < 18.5 ? "Bajo peso" :
        imc < 25 ? "Peso normal" :
        imc < 30 ? "Sobrepeso" :
        "Obesidad";

    let tmb;

    if (sexo === "hombre") {
        tmb = 10 * peso + 6.25 * altura - 5 * edad + 5;
    } else {
        tmb = 10 * peso + 6.25 * altura - 5 * edad - 161;
    }

    const tdee = tmb * actividad;

    let calorias;

    if (objetivo === "deficit") calorias = tdee - 500;
    else if (objetivo === "superavit") calorias = tdee + 300;
    else calorias = tdee;

    const proteina = peso * 2;
    const grasa = peso * 1;
    const carbohidratos = (calorias - (proteina * 4 + grasa * 9)) / 4;
    const agua = peso * 35;

    resultado.innerHTML = `
        <div class="result-grid">

            <div class="result-card highlight">
                <h3>Calorías diarias</h3>
                <p>${calorias.toFixed(0)} kcal</p>
                <span>${objetivo === "deficit" ? "Pérdida de grasa" : objetivo === "superavit" ? "Ganancia muscular" : "Mantenimiento"}</span>
            </div>

            <div class="result-card">
                <h3>IMC</h3>
                <p>${imc.toFixed(2)}</p>
                <span>${imcText}</span>
            </div>

            <div class="result-card">
                <h3>Proteína</h3>
                <p>${proteina.toFixed(0)} g</p>
                <span>2 g por kg</span>
            </div>

            <div class="result-card">
                <h3>Grasas</h3>
                <p>${grasa.toFixed(0)} g</p>
                <span>1 g por kg</span>
            </div>

            <div class="result-card">
                <h3>Carbohidratos</h3>
                <p>${carbohidratos.toFixed(0)} g</p>
                <span>Energía restante</span>
            </div>

            <div class="result-card">
                <h3>Agua diaria</h3>
                <p>${agua.toFixed(0)} ml</p>
                <span>35 ml por kg</span>
            </div>

        </div>
    `;
});

// RESET
btnReset.addEventListener("click", () => {

    document.getElementById("edad").value = "";
    document.getElementById("peso").value = "";
    document.getElementById("altura").value = "";
    resultado.innerHTML = `<p class="placeholder">Completa los datos para ver tu análisis</p>`;

});
</script>

</body>
</html>
